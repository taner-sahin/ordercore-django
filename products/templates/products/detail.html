{% extends "base.html" %} {% block content %}
<div class="container py-5">
  <div class="row">
    <div class="col-md-6">
      {% if product.image %}
      <img
        src="{{ product.image.url }}"
        class="img-fluid rounded"
        alt="{{ product.name }}"
      />
      {% endif %}
    </div>

    <div class="col-md-6">
      <h1 class="mb-3">{{ product.name }}</h1>
      <p class="fs-4 mb-3">{{ product.price }} TL</p>
      <p class="mb-3">Kategori: {{ product.category.name }}</p>
      <a href="{% url 'cart:add_to_cart' product.id %}" class="btn btn-dark">
        Add to Cart
      </a>
      {% if product.description %}
      <p>{{ product.description }}</p>
      {% endif %}
    </div>
  </div>
</div>
{% endblock %}
